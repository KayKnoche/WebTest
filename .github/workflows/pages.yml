name: Configure GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  configure-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages on main root
        run: |
          echo 'Configuring GitHub Pages for repository:' "$GITHUB_REPOSITORY"
          curl -sS -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/$GITHUB_REPOSITORY/pages \
            -d '{"source":{"branch":"main","path":"/"}}'
